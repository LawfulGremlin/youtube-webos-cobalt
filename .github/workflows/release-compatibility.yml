name: Release compatibility

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-ipk:
    name: Verify webOS package compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Download Homebrew Toolbox
        uses: robinraju/release-downloader@v1.9
        with:
          repository: webosbrew/dev-toolbox-cli
          latest: true
          fileName: webosbrew-toolbox-*.deb
          out-file-path: toolbox

      - name: Install package verifier
        run: sudo apt-get update && sudo apt-get install -y ./toolbox/webosbrew-toolbox-*.deb

      - name: Download release IPK
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          mkdir -p release
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.ipk' --dir release
          test -n "$(find release -maxdepth 1 -type f -name '*.ipk' -print -quit)"

      - name: Check IPK and Cobalt binary compatibility
        run: |
          set -o pipefail
          find release -maxdepth 1 -type f -name '*.ipk' -print0 |
            while IFS= read -r -d '' package; do
              echo "# $(basename "$package")" | tee -a compatibility-report.md
              webosbrew-ipk-verify --format markdown --details "$package" | tee -a compatibility-report.md
            done

      - name: Upload compatibility report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-compatibility-report
          path: compatibility-report.md
          if-no-files-found: warn
